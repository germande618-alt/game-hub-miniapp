<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#1e1e1e;
color:white;
}

button{
display:block;
margin:10px auto;
padding:15px;
font-size:18px;
border-radius:10px;
border:none;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

</style>

</head>

<body>

<div id="app"></div>

<script>

// ---------- ПЕРЕВОДЫ ----------

const translations = {

en:{
title:"Game Hub",
couple:"❤️ Couple Games",
party:"🎉 Party Games",
online:"🌐 Online Games",
choose:"Choose language",
settings:"⚙ Change language"
},

ru:{
title:"Игровой центр",
couple:"❤️ Игры для пар",
party:"🎉 Игры для вечеринок",
online:"🌐 Онлайн игры",
choose:"Выберите язык",
settings:"⚙ Сменить язык"
},

es:{
title:"Centro de Juegos",
couple:"❤️ Juegos para Parejas",
party:"🎉 Juegos para Fiesta",
online:"🌐 Juegos Online",
choose:"Elige idioma",
settings:"⚙ Cambiar idioma"
},

fr:{
title:"Centre de Jeux",
couple:"❤️ Jeux pour Couples",
party:"🎉 Jeux de Fête",
online:"🌐 Jeux en Ligne",
choose:"Choisir la langue",
settings:"⚙ Changer la langue"
},

de:{
title:"Spiele Hub",
couple:"❤️ Spiele für Paare",
party:"🎉 Partyspiele",
online:"🌐 Online Spiele",
choose:"Sprache wählen",
settings:"⚙ Sprache ändern"
}

}

// ---------- ЯЗЫК ----------

let lang = localStorage.getItem("lang")

// ---------- ОПРЕДЕЛЕНИЕ ЯЗЫКА TELEGRAM ----------

function detectTelegramLanguage(){

if(window.Telegram && Telegram.WebApp){

let tgLang = Telegram.WebApp.initDataUnsafe.user.language_code

if(translations[tgLang]){
lang = tgLang
localStorage.setItem("lang",tgLang)
}

}

}

// ---------- ВЫБОР ЯЗЫКА ----------

function showLanguageSelect(){

document.getElementById("app").innerHTML = `
<h2>${translations.en.choose}</h2>

<button onclick="setLang('en')">🇬🇧 English</button>
<button onclick="setLang('ru')">🇷🇺 Русский</button>
<button onclick="setLang('es')">🇪🇸 Español</button>
<button onclick="setLang('fr')">🇫🇷 Français</button>
<button onclick="setLang('de')">🇩🇪 Deutsch</button>
`

}

// ---------- УСТАНОВКА ЯЗЫКА ----------

function setLang(selected){

lang = selected
localStorage.setItem("lang",selected)

loadMain()

}

// ---------- ГЛАВНОЕ МЕНЮ ----------

function loadMain(){

const t = translations[lang]

document.getElementById("app").innerHTML = `
<h1>${t.title}</h1>

<button onclick="openSection('couple')">${t.couple}</button>
<button onclick="openSection('party')">${t.party}</button>
<button onclick="openSection('online')">${t.online}</button>

<br>

<button onclick="changeLanguage()">${t.settings}</button>

<div id="content"></div>
`

}

// ---------- РАЗДЕЛЫ ----------

function openSection(section){

const content = document.getElementById("content")

if(section==="couple"){
content.innerHTML = `
<h2>Couple Games</h2>
<button>Truth or Dare</button>
<button>Couple Questions</button>
`
}

if(section==="party"){
content.innerHTML = `
<h2>Party Games</h2>
<button>Never Have I Ever</button>
<button>Who is most likely to</button>
`
}

if(section==="online"){
content.innerHTML = `
<h2>Online Games</h2>
<button>Mafia</button>
<button>Drawing Game</button>
`
}

}

// ---------- СМЕНА ЯЗЫКА ----------

function changeLanguage(){

showLanguageSelect()

}

// ---------- СТАРТ ----------

if(!lang){

detectTelegramLanguage()

if(!lang){
showLanguageSelect()
}else{
loadMain()
}

}else{

loadMain()

}

</script>

</body>
</html>
