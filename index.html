<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#1e1e1e;
color:white;
margin:0;
padding:20px;
}

button{
display:block;
margin:12px auto;
padding:16px;
font-size:18px;
border-radius:12px;
border:none;
background:#3b82f6;
color:white;
cursor:pointer;
width:230px;
}

button:hover{
background:#2563eb;
}

input{
padding:12px;
margin:8px;
font-size:16px;
border-radius:8px;
border:none;
width:200px;
}

.player{
margin:5px;
font-size:18px;
}

</style>

</head>

<body>

<div id="app"></div>

<script>

let lang = localStorage.getItem("lang")

let players = []
let currentPlayer = 0

const translations = {

ru:{
title:"Игровой центр",
couple:"Игры для пар",
party:"Игры для вечеринок",
choose:"Выберите язык",
settings:"Сменить язык",
addPlayer:"Добавить игрока",
start:"Начать игру",
playerName:"Имя игрока",
truth:"Правда",
dare:"Действие",
next:"Следующий",
back:"Назад"
},

en:{
title:"Game Hub",
couple:"Couple Games",
party:"Party Games",
choose:"Choose language",
settings:"Change language",
addPlayer:"Add player",
start:"Start game",
playerName:"Player name",
truth:"Truth",
dare:"Dare",
next:"Next",
back:"Back"
},

es:{
title:"Centro de juegos",
couple:"Juegos para parejas",
party:"Juegos de fiesta",
choose:"Elegir idioma",
settings:"Cambiar idioma",
addPlayer:"Agregar jugador",
start:"Comenzar",
playerName:"Nombre",
truth:"Verdad",
dare:"Reto",
next:"Siguiente",
back:"Atrás"
},

fr:{
title:"Centre de jeux",
couple:"Jeux pour couples",
party:"Jeux de soirée",
choose:"Choisir la langue",
settings:"Changer langue",
addPlayer:"Ajouter joueur",
start:"Commencer",
playerName:"Nom du joueur",
truth:"Vérité",
dare:"Action",
next:"Suivant",
back:"Retour"
}

}

function showLanguageSelect(){

document.getElementById("app").innerHTML=`

<h2>${translations.en.choose}</h2>

<button onclick="setLang('ru')">Русский</button>
<button onclick="setLang('en')">English</button>
<button onclick="setLang('es')">Español</button>
<button onclick="setLang('fr')">Français</button>

`

}

function setLang(l){

lang=l
localStorage.setItem("lang",l)
loadMain()

}

function loadMain(){

const t = translations[lang]

document.getElementById("app").innerHTML=`

<h1>${t.title}</h1>

<button onclick="openCouple()">❤️ ${t.couple}</button>
<button onclick="openParty()">🎉 ${t.party}</button>

<button onclick="changeLanguage()">⚙ ${t.settings}</button>

`

}

function changeLanguage(){
showLanguageSelect()
}

function openCouple(){

const t = translations[lang]

document.getElementById("app").innerHTML=`

<h2>❤️ ${t.couple}</h2>

<button onclick="startTruthDare()">${t.truthDare}</button>

<button onclick="startCoupleQuestions()">${t.coupleQuestions}</button>

<button onclick="loadMain()">⬅ ${t.back}</button>

`

}

function startTruthDare(){

showPlayers()

}

function startCoupleQuestions(){

showPlayers()

}  

function openParty(){
showPlayers()
}

function showPlayers(){

players=[]
currentPlayer=0

const t = translations[lang]

document.getElementById("app").innerHTML=`

<h2>${t.playerName}</h2>

<input id="playerInput" placeholder="${t.playerName}">

<button onclick="addPlayer()">${t.addPlayer}</button>

<div id="playersList"></div>

<button onclick="startGame()">${t.start}</button>

<button onclick="loadMain()">⬅ ${t.back}</button>

`

}

function addPlayer(){

const input = document.getElementById("playerInput")
const name = input.value.trim()

if(name==="") return

players.push(name)

input.value=""

updatePlayers()

}

function updatePlayers(){

const list = document.getElementById("playersList")

list.innerHTML=""

players.forEach(p=>{
list.innerHTML+=`<div class="player">${p}</div>`
})

}

function startGame(){

if(players.length===0) return

currentPlayer=0

showTurn()

}

function showTurn(){

const t = translations[lang]

const player = players[currentPlayer]

document.getElementById("app").innerHTML=`

<h2>${player}</h2>

<button onclick="showTruth()">${t.truth}</button>

<button onclick="showDare()">${t.dare}</button>

<button onclick="loadMain()">⬅ ${t.back}</button>

`

}

function nextPlayer(){

currentPlayer++

if(currentPlayer>=players.length){
currentPlayer=0
}

showTurn()

}

function showTruth(){

const list = cards.truth[lang] || cards.truth.en

const challenge = list[Math.floor(Math.random()*list.length)]

showChallenge(challenge)

}

function showDare(){

const list = cards.dare[lang] || cards.dare.en

const challenge = list[Math.floor(Math.random()*list.length)]

showChallenge(challenge)

}

function showChallenge(text){

const t = translations[lang]

document.getElementById("app").innerHTML=`

<h2>${text}</h2>

<button onclick="nextPlayer()">${t.next}</button>

<button onclick="showTurn()">⬅ ${t.back}</button>

`

}

if(!lang){
showLanguageSelect()
}else{
loadMain()
}

</script>

<script src="cards.js"></script>

</body>
</html>
