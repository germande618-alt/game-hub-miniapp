<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#1e1e1e;
color:white;
}

button{
display:block;
margin:10px auto;
padding:15px;
font-size:18px;
border-radius:10px;
border:none;
background:#3b82f6;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="app"></div>

<script>

// ---------- ПЕРЕВОДЫ ----------

const translations = {

en:{
title:"Game Hub",
couple:"❤️ Couple Games",
party:"🎉 Party Games",
online:"🌐 Online Games",
choose:"Choose language",
settings:"⚙ Language"
},

ru:{
title:"Игровой центр",
couple:"❤️ Игры для пар",
party:"🎉 Игры для вечеринок",
online:"🌐 Онлайн игры",
choose:"Выберите язык",
settings:"⚙ Язык"
},

es:{
title:"Centro de Juegos",
couple:"❤️ Juegos para Parejas",
party:"🎉 Juegos para Fiesta",
online:"🌐 Juegos Online",
choose:"Elige idioma",
settings:"⚙ Idioma"
},

fr:{
title:"Centre de Jeux",
couple:"❤️ Jeux pour Couples",
party:"🎉 Jeux de Fête",
online:"🌐 Jeux en Ligne",
choose:"Choisir la langue",
settings:"⚙ Langue"
},

de:{
title:"Spiele Hub",
couple:"❤️ Spiele für Paare",
party:"🎉 Partyspiele",
online:"🌐 Online Spiele",
choose:"Sprache wählen",
settings:"⚙ Sprache"
}

}

// ---------- ЯЗЫК ПОЛЬЗОВАТЕЛЯ ----------

let lang = localStorage.getItem("lang")

// ---------- АВТОЯЗЫК TELEGRAM ----------

function detectTelegramLanguage(){

if(window.Telegram && Telegram.WebApp){

let tgLang = Telegram.WebApp.initDataUnsafe.user.language_code

if(translations[tgLang]){
lang = tgLang
}

}

}

// ---------- ВЫБОР ЯЗЫКА ----------

function showLanguageSelect(){

document.getElementById("app").innerHTML = `
<h2>${translations.en.choose}</h2>

<button onclick="setLang('en')">🇬🇧 English</button>
<button onclick="setLang('ru')">🇷🇺 Русский</button>
<button onclick="setLang('es')">🇪🇸 Español</button>
<button onclick="setLang('fr')">🇫🇷 Français</button>
<button onclick="setLang('de')">🇩🇪 Deutsch</button>
`

}

// ---------- УСТАНОВКА ЯЗЫКА ----------

function setLang(selected){

localStorage.setItem("lang",selected)
lang = selected

loadMain()

}

// ---------- ГЛАВНЫЙ ЭКРАН ----------

function loadMain(){

const t = translations[lang]

document.getElementById("app").innerHTML = `
<h1>${t.title}</h1>

<button>${t.couple}</button>
<button>${t.party}</button>
<button>${t.online}</button>

<br>

<button onclick="changeLanguage()">${t.settings}</button>
`

}

// ---------- СМЕНА ЯЗЫКА ----------

function changeLanguage(){

localStorage.removeItem("lang")
showLanguageSelect()

}

// ---------- СТАРТ ПРИЛОЖЕНИЯ ----------

if(!lang){

detectTelegramLanguage()

if(lang){
loadMain()
}else{
showLanguageSelect()
}

}else{
loadMain()
}

</script>

</body>
</html>
