<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#1e1e1e;
color:white;
margin:0;
padding:20px;
}

button{
display:block;
margin:12px auto;
padding:16px;
font-size:18px;
border-radius:12px;
border:none;
background:#3b82f6;
color:white;
cursor:pointer;
width:240px;
}

button:hover{
background:#2563eb;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

</style>

</head>

<body>

<div id="app"></div>

<script>

const translations = {

en:{
title:"Game Hub",
couple:"❤️ Couple Games",
party:"🎉 Party Games",
online:"🌐 Online Games",
choose:"Choose language",
settings:"⚙ Change language",
truth:"Truth or Dare",
questions:"Couple Questions",
never:"Never Have I Ever",
likely:"Who is most likely to",
mafia:"Mafia",
draw:"Drawing Game",
back:"⬅ Back",
addPlayer:"Add Player",
startGame:"Start Game",
playerName:"Player name",
truthBtn:"Truth",
dareBtn:"Dare",
next:"Next"
},

ru:{
title:"Игровой центр",
couple:"❤️ Игры для пар",
party:"🎉 Игры для вечеринок",
online:"🌐 Онлайн игры",
choose:"Выберите язык",
settings:"⚙ Сменить язык",
truth:"Правда или действие",
questions:"Вопросы для пар",
never:"Я никогда не",
likely:"Кто скорее всего",
mafia:"Мафия",
draw:"Рисуй и угадывай",
back:"⬅ Назад",
addPlayer:"Добавить игрока",
startGame:"Начать игру",
playerName:"Имя игрока",
truthBtn:"Правда",
dareBtn:"Действие",
next:"Следующий"
}

};

let lang = localStorage.getItem("lang");

function showLanguageSelect(){

document.getElementById("app").innerHTML = `
<h2>${translations.en.choose}</h2>

<button onclick="setLang('en')">🇬🇧 English</button>
<button onclick="setLang('ru')">🇷🇺 Русский</button>
`;

}

function setLang(selected){

lang = selected;
localStorage.setItem("lang",selected);

loadMain();

}

function loadMain(){

const t = translations[lang];

document.getElementById("app").innerHTML = `
<h1>${t.title}</h1>

<button onclick="openSection('couple')">${t.couple}</button>
<button onclick="openSection('party')">${t.party}</button>
<button onclick="openSection('online')">${t.online}</button>

<br>

<button onclick="changeLanguage()">${t.settings}</button>
`;

}

function openSection(section){

const t = translations[lang];

if(section==="couple"){

document.getElementById("app").innerHTML = `
<h1>${t.couple}</h1>

<button onclick="startTruthDare()">${t.truth}</button>
<button>${t.questions}</button>

<br>

<button onclick="loadMain()">${t.back}</button>
`;

}

if(section==="party"){

document.getElementById("app").innerHTML = `
<h1>${t.party}</h1>

<button>${t.never}</button>
<button>${t.likely}</button>

<br>

<button onclick="loadMain()">${t.back}</button>
`;

}

if(section==="online"){

document.getElementById("app").innerHTML = `
<h1>${t.online}</h1>

<button>${t.mafia}</button>
<button>${t.draw}</button>

<br>

<button onclick="loadMain()">${t.back}</button>
`;

}

}

// ---------- GAME ----------

let players = [];
let currentPlayer = 0;

function startTruthDare(){

const t = translations[lang];

document.getElementById("app").innerHTML = `
<h1>${t.truth}</h1>

<input id="playerName" placeholder="${t.playerName}">

<button onclick="addPlayer()">${t.addPlayer}</button>

<div id="playerList"></div>

<button onclick="startGame()">${t.startGame}</button>

<button onclick="openSection('couple')">${t.back}</button>
`;

}

function addPlayer(){

let name = document.getElementById("playerName").value;

if(name){

players.push(name);

document.getElementById("playerName").value="";

document.getElementById("playerList").innerHTML =
players.map(p => `<p>${p}</p>`).join("");

}

}

function startGame(){

showTurn();

}

function showTurn(){

const t = translations[lang];

let player = players[currentPlayer];

document.getElementById("app").innerHTML = `
<h1>${player}</h1>

<button onclick="showTruth()">${t.truthBtn}</button>
<button onclick="showDare()">${t.dareBtn}</button>
`;

}

const truths = [
"Tell your biggest secret",
"What is your biggest fear?",
"What was your most embarrassing moment?"
];

const dares = [
"Dance for 10 seconds",
"Sing a song",
"Do 5 pushups"
];

function showTruth(){

let challenge = truths[Math.floor(Math.random()*truths.length)];

showChallenge(challenge);

}

function showDare(){

let challenge = dares[Math.floor(Math.random()*dares.length)];

showChallenge(challenge);

}

function showChallenge(text){

const t = translations[lang];

document.getElementById("app").innerHTML = `
<h2>${text}</h2>

<button onclick="nextPlayer()">${t.next}</button>
`;

}

function nextPlayer(){

currentPlayer++;

if(currentPlayer >= players.length){
currentPlayer = 0;
}

showTurn();

}

function changeLanguage(){

showLanguageSelect();

}

if(!lang){

showLanguageSelect();

}else{

loadMain();

}

</script>

</body>
</html>
