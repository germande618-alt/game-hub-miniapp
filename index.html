<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#1e1e1e;
color:white;
margin:0;
padding:20px;
}

button{
display:block;
margin:12px auto;
padding:16px;
font-size:18px;
border-radius:12px;
border:none;
background:#3b82f6;
color:white;
cursor:pointer;
width:240px;
}

button:hover{
background:#2563eb;
}

h1{
margin-top:10px;
}

</style>

</head>

<body>

<div id="app"></div>

<script>

const translations = {

en:{
title:"Game Hub",
couple:"❤️ Couple Games",
party:"🎉 Party Games",
online:"🌐 Online Games",
choose:"Choose language",
settings:"⚙️ Change language",
truth:"Truth or Dare",
questions:"Couple Questions",
never:"Never Have I Ever",
likely:"Who is most likely to",
mafia:"Mafia",
draw:"Drawing Game",
back:"⬅️ Back"
},

ru:{
title:"Игровой центр",
couple:"❤️ Игры для пар",
party:"🎉 Игры для вечеринок",
online:"🌐 Онлайн игры",
choose:"Выберите язык",
settings:"⚙️ Сменить язык",
truth:"Правда или действие",
questions:"Вопросы для пар",
never:"Я никогда не",
likely:"Кто скорее всего",
mafia:"Мафия",
draw:"Рисуй и угадывай",
back:"⬅️ Назад"
},

es:{
title:"Centro de Juegos",
couple:"❤️ Juegos para Parejas",
party:"🎉 Juegos para Fiesta",
online:"🌐 Juegos Online",
choose:"Elige idioma",
settings:"⚙️ Cambiar idioma",
truth:"Verdad o Reto",
questions:"Preguntas de Pareja",
never:"Nunca he",
likely:"Quién es más probable",
mafia:"Mafia",
draw:"Dibujar y adivinar",
back:"⬅️ Atrás"
},

fr:{
title:"Centre de Jeux",
couple:"❤️ Jeux pour Couples",
party:"🎉 Jeux de Fête",
online:"🌐 Jeux en Ligne",
choose:"Choisir la langue",
settings:"⚙️ Changer la langue",
truth:"Vérité ou Action",
questions:"Questions pour Couples",
never:"Je n'ai jamais",
likely:"Qui est le plus susceptible",
mafia:"Mafia",
draw:"Dessiner et deviner",
back:"⬅️ Retour"
},

de:{
title:"Spiele Hub",
couple:"❤️ Spiele für Paare",
party:"🎉 Partyspiele",
online:"🌐 Online Spiele",
choose:"Sprache wählen",
settings:"⚙️ Sprache ändern",
truth:"Wahrheit oder Pflicht",
questions:"Paarfragen",
never:"Ich habe noch nie",
likely:"Wer ist am ehesten",
mafia:"Mafia",
draw:"Zeichnen und raten",
back:"⬅️ Zurück"
}

}

let lang = localStorage.getItem("lang")

function detectTelegramLanguage(){

if(window.Telegram && Telegram.WebApp){

let tgLang = Telegram.WebApp.initDataUnsafe.user.language_code

if(translations[tgLang]){
lang = tgLang
localStorage.setItem("lang",tgLang)
}

}

}

function showLanguageSelect(){

document.getElementById("app").innerHTML = `
<h2>${translations.en.choose}</h2>

<button onclick="setLang('en')">🇬🇧 English</button>
<button onclick="setLang('ru')">🇷🇺 Русский</button>
<button onclick="setLang('es')">🇪🇸 Español</button>
<button onclick="setLang('fr')">🇫🇷 Français</button>
<button onclick="setLang('de')">🇩🇪 Deutsch</button>
`

}

function setLang(selected){

lang = selected
localStorage.setItem("lang",selected)

loadMain()

}

function loadMain(){

const t = translations[lang]

document.getElementById("app").innerHTML = `
<h1>${t.title}</h1>

<button onclick="openSection('couple')">${t.couple}</button>
<button onclick="openSection('party')">${t.party}</button>
<button onclick="openSection('online')">${t.online}</button>

<br>

<button onclick="changeLanguage()">${t.settings}</button>
`

}

function openSection(section){

const t = translations[lang]

if(section==="couple"){

document.getElementById("app").innerHTML = `
<h1>${t.couple}</h1>

<button onclick="startTruthDare()">${t.truth}</button>
<button>${t.questions}</button>

<br>

<button onclick="loadMain()">${t.back}</button>
`

}

if(section==="party"){

document.getElementById("app").innerHTML = `
<h1>${t.party}</h1>

<button>${t.never}</button>
<button>${t.likely}</button>

<br>

<button onclick="loadMain()">${t.back}</button>
`

}

if(section==="online"){

document.getElementById("app").innerHTML = `
<h1>${t.online}</h1>

<button>${t.mafia}</button>
<button>${t.draw}</button>

<br>

<button onclick="loadMain()">${t.back}</button>
`

}

}

function changeLanguage(){

showLanguageSelect()

}

if(!lang){
  detectTelegramLanguage()

if(!lang){
showLanguageSelect()
}else{
loadMain()
}

}else{
loadMain()
}
// ---------- TRUTH OR DARE GAME ----------

let players = []
let currentPlayer = 0

function startTruthDare(){

document.getElementById("app").innerHTML = `
<h1>Truth or Dare</h1>

<input id="playerName" placeholder="Player name">

<button onclick="addPlayer()">Add Player</button>

<div id="playerList"></div>

<button onclick="startGame()">Start Game</button>

<button onclick="loadMain()">⬅️ Back</button>
`

}

function addPlayer(){

let name = document.getElementById("playerName").value

if(name){
players.push(name)
document.getElementById("playerName").value=""
updatePlayerList()
}

}

function updatePlayerList(){

document.getElementById("playerList").innerHTML =
players.map(p => <p>${p}</p>).join("")

}

function startGame(){

showTurn()

}

function showTurn(){

let player = players[currentPlayer]

document.getElementById("app").innerHTML = `
<h1>${player}'s Turn</h1>

<button onclick="showTruth()">Truth</button>
<button onclick="showDare()">Dare</button>
`

}

const truths = [
"What is your biggest secret?",
"What is your biggest fear?",
"What is your most embarrassing moment?"
]

const dares = [
"Dance for 10 seconds",
"Sing a song",
"Do 5 pushups"
]

function showTruth(){

let challenge = truths[Math.floor(Math.random()*truths.length)]

showChallenge(challenge)

}

function showDare(){

let challenge = dares[Math.floor(Math.random()*dares.length)]

showChallenge(challenge)

}

function showChallenge(text){

document.getElementById("app").innerHTML = `
<h2>${text}</h2>

<button onclick="nextPlayer()">Next</button>
`

}

function nextPlayer(){

currentPlayer++

if(currentPlayer >= players.length){
currentPlayer = 0
}

showTurn()

}
</script>

</body>
</html>
