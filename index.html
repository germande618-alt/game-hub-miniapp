<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#1e1e1e;
color:white;
margin:0;
padding:20px;
}

button{
display:block;
margin:12px auto;
padding:16px;
font-size:18px;
border-radius:12px;
border:none;
background:#3b82f6;
color:white;
cursor:pointer;
width:220px;
}

button:hover{
background:#2563eb;
}

</style>

</head>

<body>

<div id="app"></div>

<script>

let lang = localStorage.getItem("lang")

const translations = {

ru:{
title:"Игровой центр",
couple:" Игры для пар",
party:" Игры для вечеринок",
online:" Онлайн игры",
choose:"Выберите язык",
settings:"⚙ Сменить язык",
truth:"Правда",
dare:"Действие",
next:"Следующий",
back:"⬅ Назад"
},

en:{
title:"Game Hub",
couple:" Couple Games",
party:" Party Games",
online:" Online Games",
choose:"Choose language",
settings:"⚙ Change language",
truth:"Truth",
dare:"Dare",
next:"Next",
back:"⬅ Back"
},

es:{
title:"Centro de juegos",
couple:" Juegos para parejas",
party:" Juegos de fiesta",
online:" Juegos online",
choose:"Elige idioma",
settings:"⚙ Cambiar idioma",
truth:"Verdad",
dare:"Reto",
next:"Siguiente",
back:"⬅ Volver"
},

fr:{
title:"Centre de jeux",
couple:" Jeux pour couples",
party:" Jeux de soirée",
online:" Jeux en ligne",
choose:"Choisir la langue",
settings:"⚙ Changer de langue",
truth:"Vérité",
dare:"Action",
next:"Suivant",
back:"⬅ Retour"
}

}

function showLanguageSelect(){

document.getElementById("app").innerHTML=`

<h2>${translations.en.choose}</h2>

<button onclick="setLang('ru')">Русский</button>
<button onclick="setLang('en')">English</button>
<button onclick="setLang('es')">Español</button>
<button onclick="setLang('fr')">Français</button>

`

}

function setLang(l){

lang=l

localStorage.setItem("lang",l)

loadMain()

}

function loadMain(){

const t = translations[lang]

document.getElementById("app").innerHTML=`

<h1>${t.title}</h1>

<button onclick="openCouple()">❤️ ${t.couple}</button>
<button onclick="openParty()">🎉 ${t.party}</button>
<button onclick="changeLanguage()">${t.settings}</button>

`

}

function changeLanguage(){

showLanguageSelect()

}

function openCouple(){

const t = translations[lang]

document.getElementById("app").innerHTML=`

<h2>${t.couple}</h2>

<button onclick="showTruth()">${t.truth}</button>
<button onclick="showDare()">${t.dare}</button>
<button onclick="loadMain()">${t.back}</button>

`

}

function openParty(){

const t = translations[lang]

document.getElementById("app").innerHTML=`

<h2>${t.party}</h2>

<button onclick="showTruth()">${t.truth}</button>
<button onclick="showDare()">${t.dare}</button>
<button onclick="loadMain()">${t.back}</button>

`

}

function showTruth(){

const list = cards.truth[lang] || cards.truth.en

const challenge = list[Math.floor(Math.random()*list.length)]

showChallenge(challenge)

}

function showDare(){

const list = cards.dare[lang] || cards.dare.en

const challenge = list[Math.floor(Math.random()*list.length)]

showChallenge(challenge)

}

function showChallenge(text){

const t = translations[lang]

document.getElementById("app").innerHTML=`

<h2>${text}</h2>

<button onclick="loadMain()">${t.back}</button>
<button onclick="showTruth()">${t.next}</button>

`

}

if(!lang){
showLanguageSelect()
}else{
loadMain()
}

</script>

<script src="cards.js"></script>

</body>
</html>
