function showLanguageSelect(){

document.getElementById("app").innerHTML=`

<h2>${translations.en.choose}</h2>

<button onclick="setLang('ru')">Русский</button>
<button onclick="setLang('en')">English</button>
<button onclick="setLang('es')">Español</button>
<button onclick="setLang('fr')">Français</button>

`

}

function setLang(l){

lang=l
localStorage.setItem("lang",l)
loadMain()

}

function loadMain(){

const t = translations[lang]

document.getElementById("app").innerHTML = `
<div class="fadeIn">
</div>
<h1>${t.title}</h1>

<button onclick="openCouple()">❤️ ${t.couple}</button>

<button onclick="openParty()">🎉 ${t.party}</button>

<button onclick="openOnline()">🌐 ${t.online}</button>

<br><br>

<button onclick="changeLanguage()">⚙ ${t.settings}</button>

`

}

function changeLanguage(){
showLanguageSelect()
}

function openCouple(){

const t = translations[lang]

document.getElementById("app").innerHTML=`

<h2>❤️ ${t.couple}</h2>

<button onclick="openDateIdeas()">${t.dateIdeas}</button>

<button onclick="loadMain()">⬅ ${t.back}</button>

`

}
