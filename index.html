<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Game Hub</title>

<style>

.bottleSimple{

}

#bottle{

}

#bottleResult{
font-size:28px;

}

.circlePlayer{
position:absolute;
left:50%;
top:50%;
transform-origin:center;
background:#2a2a2a;
padding:8px 12px;

font-size:16px;
white-space:nowrap;
}

.playerName{
font-size:18px;

}

.questionCard{

}
  
body{
font-family:Arial;
text-align:center;
background:#1e1e1e;
color:white;
margin:0;
padding:20px;
}

button{
display:block;
margin:12px auto;
padding:16px;
font-size:18px;

background:#3b82f6;

width:230px;
}

background:#2563eb;
}

input{

}

.player{

}

</head>

<body>

<div id="app"></div>

<script>

if(window.Telegram && Telegram.WebApp){

Telegram.WebApp.ready()
Telegram.WebApp.expand()

}

let lang = localStorage.getItem("lang")

let players = []
let currentPlayer = 0

const translations = {

ru:{
bottle:"Бутылочка",
likely:"Кто скорее всего",
never:"Я никогда не",
title:"Игровой центр",
couple:"Игры для пар",
party:"Игры для вечеринок",
choose:"Выберите язык",
settings:"Сменить язык",
addPlayer:"Добавить игрока",
start:"Начать игру",
playerName:"Имя игрока",
truth:"Правда",
dare:"Действие",
next:"Следующий",
back:"Назад",
truthDare:"Правда или действие",
coupleQuestions:"Вопросы для пар"
},

en:{
bottle:"Spin the Bottle",
likely:"Who is most likely",
never:"Never Have I Ever",
title:"Game Hub",
couple:"Couple Games",
party:"Party Games",
choose:"Choose language",
settings:"Change language",

playerName:"Player name",
truth:"Truth",
dare:"Dare",
next:"Next",
back:"Back",
truthDare:"Truth or Dare",
coupleQuestions:"Couple Questions",
truthDare:"Truth or Dare",
coupleQuestions:"Couple Questions"
},

es:{
bottle:"Gira la botella",
likely:"Quién es más probable",
never:"Yo nunca",
title:"Centro de juegos",
couple:"Juegos para parejas",
party:"Juegos de fiesta",
choose:"Elegir idioma",
settings:"Cambiar idioma",
addPlayer:"Agregar jugador",
start:"Comenzar",
playerName:"Nombre",
truth:"Verdad",
dare:"Reto",
next:"Siguiente",
back:"Atrás",
truthDare:"Verdad o reto",
coupleQuestions:"Preguntas para parejas"
},

fr:{
bottle:"Bouteille",
likely:"Qui est le plus susceptible",
never:"Je n'ai jamais",
title:"Centre de jeux",
couple:"Jeux pour couples",
party:"Jeux de soirée",
choose:"Choisir la langue",
settings:"Changer langue",
addPlayer:"Ajouter joueur",
start:"Commencer",
playerName:"Nom du joueur",
truth:"Vérité",
dare:"Action",
next:"Suivant",
back:"Retour",
truthDare:"Vérité ou action",
coupleQuestions:"Questions pour couples"
}

}

function showLanguageSelect(){

document.getElementById("app").innerHTML=`

<h2>${translations.en.choose}</h2>

<button onclick="setLang('ru')">Русский</button>
<button onclick="setLang('en')">English</button>
<button onclick="setLang('es')">Español</button>
<button onclick="setLang('fr')">Français</button>

`

}

function setLang(l){

lang=l
localStorage.setItem("lang",l)
loadMain()

}

function loadMain(){

const t = translations[lang]

document.getElementById("app").innerHTML=`

<h1>${t.title}</h1>

<button onclick="openCouple()">❤️ ${t.couple}</button>
<button onclick="openParty()">🎉 ${t.party}</button>

<button onclick="changeLanguage()">⚙ ${t.settings}</button>

`

}

function changeLanguage(){
showLanguageSelect()
}

function openCouple(){

const t = translations[lang]

document.getElementById("app").innerHTML=`

<h2>❤️ ${t.couple}</h2>

<button onclick="startTruthDare()">${t.truthDare}</button>

<button onclick="startCoupleQuestions()">${t.coupleQuestions}</button>

<button onclick="loadMain()">⬅ ${t.back}</button>

`

}

function startTruthDare(){

showPlayers()

}

function startCoupleQuestions(){

showPlayers()

}  

function openParty(){

const t = translations[lang]

document.getElementById("app").innerHTML=`

<h1>🎉 ${t.party}</h1>

<button onclick="startNever()">${t.never}</button>

<button onclick="startLikely()">${t.likely}</button>

<button onclick="startBottle()">${t.bottle}</button>

<button onclick="loadMain()">⬅ ${t.back}</button>

`

}

function showPlayers(){

players=[]
currentPlayer=0

const t = translations[lang]

document.getElementById("app").innerHTML=`

<h2>${t.playerName}</h2>

<input id="playerInput" placeholder="${t.playerName}">

<button onclick="addPlayer()">${t.addPlayer}</button>

<div id="playersList"></div>

<button onclick="startGame()">${t.start}</button>

<button onclick="loadMain()">⬅ ${t.back}</button>

`

}

function addPlayer(){

const input = document.getElementById("playerInput")
const name = input.value.trim()

if(name==="") return

players.push(name)

input.value=""

updatePlayers()

}

function updatePlayers(){

const list = document.getElementById("playersList")

list.innerHTML=""

players.forEach(p=>{
list.innerHTML+=`<div class="player">${p}</div>`
})

}

function startGame(){

if(players.length===0) return

currentPlayer=0

showTurn()

}

function showTurn(){

const t = translations[lang]

const player = players[currentPlayer]

document.getElementById("app").innerHTML=`

<h2>${player}</h2>

<button onclick="showTruth()">${t.truth}</button>

<button onclick="showDare()">${t.dare}</button>

<button onclick="loadMain()">⬅ ${t.back}</button>

`

}

function nextPlayer(){

currentPlayer++

if(currentPlayer>=players.length){
currentPlayer=0
}

showTurn()

}

function showTruth(){

const list = cards.truth[lang] || cards.truth.en

const challenge = list[Math.floor(Math.random()*list.length)]

showChallenge(challenge)

}

function showDare(){

const list = cards.dare[lang] || cards.dare.en

const challenge = list[Math.floor(Math.random()*list.length)]

showChallenge(challenge)

}

function showChallenge(text){

const t = translations[lang]

document.getElementById("app").innerHTML=`

<h2>${text}</h2>

<button onclick="nextPlayer()">${t.next}</button>

<button onclick="showTurn()">⬅ ${t.back}</button>

`

}

if(!lang){
showLanguageSelect()
}else{
loadMain()
}

</script>

<script src="games/couple/truthdare/cards.js"></script>
<script src="games/couple/truthdare/game.js"></script>
<script src="games/couple/questions/cards.js"></script>
<script src="games/couple/questions/game.js"></script>
<script src="games/party/never/cards.js"></script>
<script src="games/party/never/game.js"></script>
<script src="games/party/likely/cards.js"></script>
<script src="games/party/likely/game.js"></script>
<script src="games/party/bottle/game.js"></script>

</body>
</html>
